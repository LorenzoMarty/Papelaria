# View resolver para JSP
spring.mvc.view.prefix=/WEB-INF/pages/
spring.mvc.view.suffix=.jsp

# Porta padrao
server.port=8080

# Configuracao do banco de dados
# O sistema le as propriedades: papelaria.db.url, papelaria.db.user, papelaria.db.password
# Ou variaveis de ambiente: PAPELARIA_DB_URL, PAPELARIA_DB_USER, PAPELARIA_DB_PASSWORD
# Padroes (se nao configurado): localhost:5432/papelaria, usuario=postgres, senha=123
